server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: any unknown path falls back to index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API. Browser never speaks to backend:8000 directly.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Convenience: same-origin /health → backend /health (used by curl smoke checks).
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # Static asset caching.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
