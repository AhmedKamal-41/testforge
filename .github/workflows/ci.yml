name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_visual:
        description: "Also run the visual regression suite (Linux baselines required)"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/frontend/package-lock.json
            qa/e2e/package-lock.json

      - name: Pin npm to 10
        run: npm install -g npm@10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: apps/frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: apps/frontend
        run: npm run build

      - name: Install Playwright framework deps
        working-directory: qa/e2e
        run: npm ci

      - name: Playwright framework typecheck
        working-directory: qa/e2e
        run: npm run typecheck

      - name: Install backend deps (for ruff)
        working-directory: apps/backend
        run: pip install -r requirements.txt

      - name: Backend lint (ruff)
        working-directory: apps/backend
        run: ruff check .

  backend-tests:
    name: backend-tests
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: apps/backend
        run: pip install -r requirements.txt

      - name: Run pytest (fast SQLite suite)
        working-directory: apps/backend
        run: pytest -v

  playwright:
    name: ${{ matrix.name }}
    needs: quality-gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            name: playwright-smoke
            grep: "@smoke"
            reset: true
          - suite: api
            name: playwright-api
            grep: "@api"
            reset: false
          - suite: regression
            name: playwright-regression
            grep: "@regression"
            reset: false
          - suite: a11y
            name: accessibility
            grep: "@a11y"
            reset: false
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the ShopLite stack
        run: docker compose up -d --build

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health > /dev/null; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:5173 > /dev/null; then
              echo "frontend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "frontend never became healthy"
          docker compose logs frontend
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qa/e2e/package-lock.json

      - name: Pin npm to 10
        run: npm install -g npm@10

      - name: Install JS dependencies
        working-directory: qa/e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('qa/e2e/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: qa/e2e
        run: npx playwright install --with-deps chromium

      - name: Reset database (smoke only)
        if: matrix.reset
        working-directory: qa/e2e
        run: node ./scripts/reset-db.mjs

      - name: Run ${{ matrix.suite }} suite
        working-directory: qa/e2e
        env:
          CI: "true"
        run: npx playwright test --project=chromium --grep "${{ matrix.grep }}" --workers=1

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: qa/e2e/playwright-report/
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}
          path: qa/e2e/allure-results/
          if-no-files-found: ignore

      - name: Upload screenshots, videos, and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.suite }}
          path: qa/e2e/test-results/
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt || true

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.suite }}
          path: docker-logs.txt
          if-no-files-found: ignore

  playwright-visual:
    name: playwright-visual
    if: github.event_name == 'workflow_dispatch' && inputs.run_visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the ShopLite stack
        run: docker compose up -d --build

      - name: Wait for stack
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health > /dev/null && curl -fs http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qa/e2e/package-lock.json

      - name: Pin npm to 10
        run: npm install -g npm@10

      - name: Install JS dependencies
        working-directory: qa/e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('qa/e2e/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: qa/e2e
        run: npx playwright install --with-deps chromium

      - name: Run visual suite
        working-directory: qa/e2e
        env:
          CI: "true"
        run: npm run test:visual

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: qa/e2e/test-results/
          if-no-files-found: ignore

      - name: Upload Playwright HTML report (visual)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: qa/e2e/playwright-report/
          if-no-files-found: ignore

  allure-report:
    name: allure-report
    needs: playwright
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (for Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: qa/e2e/package-lock.json

      - name: Pin npm to 10
        run: npm install -g npm@10

      - name: Install JS dependencies
        working-directory: qa/e2e
        run: npm ci

      - name: Download all allure-results artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: ./allure-merge-tmp

      - name: Merge allure-results
        run: |
          mkdir -p qa/e2e/allure-results
          for dir in ./allure-merge-tmp/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"* qa/e2e/allure-results/ 2>/dev/null || true
            fi
          done
          ls qa/e2e/allure-results/ | head -20

      - name: Generate merged Allure report
        working-directory: qa/e2e
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload merged Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: qa/e2e/allure-report/
          if-no-files-found: ignore
