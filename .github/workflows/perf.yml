name: Performance (k6)

# Manual only — performance tests mutate state, are sensitive to runner noise,
# and are not gating for PRs. Trigger from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      script:
        description: "Which k6 script to run"
        type: choice
        options:
          - all
          - products
          - login
          - cart
          - checkout
        default: all

jobs:
  k6:
    name: k6 ${{ inputs.script }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the ShopLite stack
        run: docker compose up -d --build

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8000/health > /dev/null; then
              echo "backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6
          k6 version

      - name: Reset database before perf run
        run: docker compose exec -T backend python -m app.seeds.seed --reset

      - name: Run products.js
        if: inputs.script == 'all' || inputs.script == 'products'
        run: k6 run --summary-export=summary-products.json qa/perf/products.js

      - name: Run login.js
        if: inputs.script == 'all' || inputs.script == 'login'
        run: k6 run --summary-export=summary-login.json qa/perf/login.js

      - name: Run cart.js
        if: inputs.script == 'all' || inputs.script == 'cart'
        run: k6 run --summary-export=summary-cart.json qa/perf/cart.js

      - name: Run checkout.js
        if: inputs.script == 'all' || inputs.script == 'checkout'
        run: k6 run --summary-export=summary-checkout.json qa/perf/checkout.js

      - name: Upload k6 summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summaries
          path: summary-*.json
          if-no-files-found: ignore

      - name: Dump docker logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt || true

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-perf
          path: docker-logs.txt
          if-no-files-found: ignore
